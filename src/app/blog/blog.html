<p>blog works!</p>
<div class="listado-noticias">
<h2>Listado de noticias</h2>

@for (noticia of noticias; track noticia.titulo) {
<div class="noticia">
    <h3>{{ noticia.titulo }}</h3>
    <img [src]="noticia.imagen" alt="{{ noticia.titulo }}" width="300">
    <p>{{ noticia.texto }}</p>
    <small>{{ noticia.fecha }}</small>
</div>
}
</div>
