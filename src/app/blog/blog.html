<header>
    <div class="logo">
        <img src="logo_noticias.png" alt="noticiaslogo" class="news-logo">
    </div>
</header>
<div class="container">
    <div class="formulario-noticia">
            <h2>Formulario de noticia</h2>
            <form (ngSubmit)="addNoticia()">
                <label for="titulo">Título*:</label>
                <input type="text" id="titulo" name="titulo" [(ngModel)]="newTitulo" required>
                <label for="imagen">Imagen (URL)*:</label>
                <input type="text" id="imagen" name="imagen" [(ngModel)]="newImagen" required>
                <label for="texto">Texto*:</label>
                <textarea id="texto" name="texto" [(ngModel)]="newTexto" required></textarea>
                @if (mensajeError) {
                    <p class="error-campo">{{ mensajeError }}</p>
                }
                <button type="submit">Publicar noticia</button>
            </form>
        </div>

    <div class="listado-noticias">
        <h2>Listado de noticias</h2>

        @for (noticia of noticias; track noticia.titulo) {
            <div class="noticia">
                <h3>{{ noticia.titulo }}</h3>
                <img [src]="noticia.imagen" alt="{{ noticia.titulo }}">
                <p>{{ noticia.texto }}</p>
                <small>{{ editarFecha(noticia.fecha) }}</small>
            </div>
        }
    </div>
</div>
<footer class="footer">
    <div class="logo-footer">
        <img src="logo_noticias.png" alt="noticiaslogo" class="footer-logo">
    </div>
    <nav class="footer-socials">
        <a href="#">X</a>
        <a href="#">Instagram</a>
        <a href="#">Pinterest</a>
    </nav>
</footer>
